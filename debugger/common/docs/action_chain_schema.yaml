# Action Chain Event Ledger Schema
#
# action_chain.jsonl is the debugger framework's only append-only event ledger.
# Each line must be a standalone JSON object that follows this schema.

schema_version: "2"

artifact_contract:
  format: jsonl
  storage_mode: append_only
  source_of_truth_role: action_chain
  description: "记录 run/session 内的事实事件，不承载快照状态。"

required_fields:
  - schema_version
  - event_id
  - ts_ms
  - run_id
  - session_id
  - agent_id
  - event_type
  - status
  - duration_ms
  - refs
  - payload

field_rules:
  schema_version:
    type: string
    allowed_values: ["2"]
  event_id:
    type: string
    description: "全局唯一事件 ID，例如 evt-0007-counterfactual-review"
  ts_ms:
    type: integer
    description: "Unix epoch milliseconds"
  run_id:
    type: string
  session_id:
    type: string
  agent_id:
    type: string
    allowed_values:
      - team_lead
      - triage_agent
      - capture_repro_agent
      - pass_graph_pipeline_agent
      - pixel_forensics_agent
      - shader_ir_agent
      - driver_device_agent
      - skeptic_agent
      - curator_agent
  event_type:
    type: string
    allowed_values:
      - dispatch
      - tool_execution
      - hypothesis_transition
      - conflict_opened
      - conflict_resolved
      - counterfactual_submitted
      - counterfactual_reviewed
      - artifact_write
      - quality_check
      - knowledge_candidate_emitted
      - knowledge_candidate_transition
  status:
    type: string
    description: "事件语义状态；取值由 event_type 决定。"
  duration_ms:
    type: integer
    min_value: 0
  refs:
    type: list
    description: "引用的 event_id / artifact ref / hypothesis_id；只做引用，不内嵌快照。"
  payload:
    type: object
    description: "event_type 专属负载。"

event_types:
  dispatch:
    statuses: [sent]
    payload_required:
      - target_agent
      - objective
  tool_execution:
    statuses: [ok, error]
    payload_required:
      - tool_name
      - transport
  hypothesis_transition:
    statuses: [applied]
    payload_required:
      - hypothesis_id
      - from_state
      - to_state
      - reason
    to_state_allowed:
      - OPEN
      - ACTIVE
      - CONFLICTED
      - ARBITRATED
      - VALIDATED
      - REFUTED
  conflict_opened:
    statuses: [open]
    payload_required:
      - conflict_id
      - hypothesis_id
      - positions
  conflict_resolved:
    statuses: [resolved]
    payload_required:
      - conflict_id
      - hypothesis_id
      - reviewer_agent
      - decision
      - rationale
  counterfactual_submitted:
    statuses: [submitted]
    payload_required:
      - review_id
      - hypothesis_id
      - proposer_agent
      - intervention
      - target_variable
      - isolation_checks
      - measurements
      - scoring
      - evidence_refs
  counterfactual_reviewed:
    statuses: [approved, rejected]
    payload_required:
      - review_id
      - hypothesis_id
      - reviewer_agent
      - isolation_verdict
      - evidence_refs
  artifact_write:
    statuses: [written, failed]
    payload_required:
      - path
      - artifact_role
  quality_check:
    statuses: [pass, fail]
    payload_required:
      - validator
      - summary
  knowledge_candidate_emitted:
    statuses: [emitted, updated]
    payload_required:
      - proposal_id
      - proposal_type
      - path
  knowledge_candidate_transition:
    statuses: [replay_validated, shadow_active, active, rolled_back]
    payload_required:
      - proposal_id
      - proposal_type
      - path

counterfactual_payload_rules:
  isolation_checks_required:
    - only_target_changed
    - same_scene_same_input
    - same_drawcall_count
  measurements_required:
    - pixel_before
    - pixel_after
    - pixel_baseline
  scoring_required:
    - pixel_recovery
    - variable_isolation
    - symptom_coverage
    - total

example_lines:
  - |
    {"schema_version":"2","event_id":"evt-0001-dispatch","ts_ms":1772537600000,"run_id":"run-20260315-001","session_id":"session-03rdc-debug-001","agent_id":"team_lead","event_type":"dispatch","status":"sent","duration_ms":18,"refs":[],"payload":{"target_agent":"triage_agent","objective":"分类当前 banding / precision 症状","handoff_brief":"优先判断是否命中精度类 SOP"}}
  - |
    {"schema_version":"2","event_id":"evt-0007-counterfactual-submit","ts_ms":1772537641000,"run_id":"run-20260315-001","session_id":"session-03rdc-debug-001","agent_id":"shader_ir_agent","event_type":"counterfactual_submitted","status":"submitted","duration_ms":310,"refs":["evt-0003-pixel-history","H-001"],"payload":{"review_id":"CF-001","hypothesis_id":"H-001","proposer_agent":"shader_ir_agent","intervention":"half diffuse -> float diffuse","target_variable":"shader precision","isolation_checks":{"only_target_changed":true,"same_scene_same_input":true,"same_drawcall_count":true},"measurements":{"pixel_before":{"x":512,"y":384,"rgba":[0.21,0.19,0.18,1.0]},"pixel_after":{"x":512,"y":384,"rgba":[0.37,0.34,0.32,1.0]},"pixel_baseline":{"x":512,"y":384,"rgba":[0.38,0.35,0.33,1.0]}},"scoring":{"pixel_recovery":0.94,"variable_isolation":1.0,"symptom_coverage":1.0,"stability":1.0,"total":0.97},"evidence_refs":["evt-0003-pixel-history","evt-0006-conflict-resolved"]}}
  - |
    {"schema_version":"2","event_id":"evt-0010-candidate","ts_ms":1772537642600,"run_id":"run-20260315-001","session_id":"session-03rdc-debug-001","agent_id":"curator_agent","event_type":"knowledge_candidate_emitted","status":"emitted","duration_ms":22,"refs":["H-001","CF-001"],"payload":{"proposal_id":"CAND-SOP-9f32a8d4c5e1","proposal_type":"sop_candidate","path":"common/knowledge/proposals/CAND-SOP-9f32a8d4c5e1.yaml"}}
