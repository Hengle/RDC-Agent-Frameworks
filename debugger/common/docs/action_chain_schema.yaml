# Action Chain Event Ledger Schema
#
# action_chain.jsonl 是 debugger framework 唯一的 append-only 事件账本。
# 每一行都必须是独立 JSON object。

schema_version: "2"

artifact_contract:
  format: jsonl
  storage_mode: append_only
  source_of_truth_role: action_chain
  description: "记录 run/session 内发生过的结构化事件，不承载 broker snapshot 全量状态。"

required_fields:
  - schema_version
  - event_id
  - ts_ms
  - run_id
  - session_id
  - agent_id
  - event_type
  - status
  - duration_ms
  - refs
  - payload

field_rules:
  schema_version:
    type: string
    allowed_values: ["2"]
  event_id:
    type: string
  ts_ms:
    type: integer
  run_id:
    type: string
  session_id:
    type: string
  agent_id:
    type: string
    allowed_values:
      - rdc-debugger
      - triage_agent
      - capture_repro_agent
      - pass_graph_pipeline_agent
      - pixel_forensics_agent
      - shader_ir_agent
      - driver_device_agent
      - skeptic_agent
      - curator_agent
  event_type:
    type: string
    allowed_values:
      - dispatch
      - tool_execution
      - hypothesis_transition
      - conflict_opened
      - conflict_resolved
      - counterfactual_submitted
      - counterfactual_reviewed
      - artifact_write
      - quality_check
      - workflow_stage_transition
      - process_deviation
      - knowledge_candidate_emitted
      - knowledge_candidate_transition
  status:
    type: string
  duration_ms:
    type: integer
    min_value: 0
  refs:
    type: list
  payload:
    type: object

common_runtime_payload_required:
  applies_to:
    - dispatch
    - tool_execution
    - artifact_write
    - quality_check
  required_fields:
    - entry_mode
    - backend
    - runtime_generation
    - snapshot_rev
    - owner_agent_id
    - lease_epoch
    - continuity_status
    - action_request_id

event_types:
  dispatch:
    statuses: [sent]
    payload_required:
      - target_agent
      - objective
      - ownership_lease_ref
  tool_execution:
    statuses: [ok, error]
    payload_required:
      - tool_name
      - transport
  artifact_write:
    statuses: [written, failed]
    payload_required:
      - path
      - artifact_role
  quality_check:
    statuses: [pass, fail]
    payload_required:
      - validator
      - summary
  workflow_stage_transition:
    statuses: [entered, exited, blocked]
    payload_required:
      - workflow_stage
  process_deviation:
    statuses: [detected]
    payload_required:
      - deviation_code
      - deviation_stage
      - deviation_detected_by
      - blocking_code
      - impact_on_verdict
      - required_recovery_action
